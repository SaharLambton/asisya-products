name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20.x"

jobs:
  # ── Backend: Build, Lint & Unit Tests ────────────────────────────────────────
  backend-build-test:
    name: Backend — Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Asisya.Products.sln

      - name: Build solution
        run: dotnet build Asisya.Products.sln --no-restore -c Release

      - name: Run unit tests
        run: |
          dotnet test tests/Asisya.Products.Tests.Unit/Asisya.Products.Tests.Unit.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=unit-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: "**/TestResults/*.trx"

  # ── Backend: Integration Tests (Testcontainers) ───────────────────────────
  backend-integration-test:
    name: Backend — Integration Tests
    runs-on: ubuntu-latest
    needs: backend-build-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Asisya.Products.sln

      - name: Build solution
        run: dotnet build Asisya.Products.sln --no-restore -c Release

      - name: Run integration tests (Testcontainers spins up PostgreSQL)
        run: |
          dotnet test tests/Asisya.Products.Tests.Integration/Asisya.Products.Tests.Integration.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=integration-results.trx"

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: "**/TestResults/*.trx"

  # ── Frontend: Build & Lint ────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── Docker Build ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: asisya-products-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: asisya-products-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
